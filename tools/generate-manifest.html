<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manifest 생성 안내</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #17202a;
    }
    main {
      max-width: 760px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border: 1px solid #d9e0e8;
      border-radius: 8px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
    }
    p {
      color: #687385;
      line-height: 1.6;
    }
    code {
      background: #eef2f6;
      padding: 2px 5px;
      border-radius: 4px;
    }
    pre {
      overflow: auto;
      background: #17202a;
      color: #fff;
      padding: 14px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>
    <h1>characters.js 생성</h1>
    <p>
      최종 사이트는 이미 생성된 <code>characters.js</code>를 사용합니다.
      descriptor를 다시 만들 때는 프로젝트 루트에서 아래 명령을 실행하세요.
    </p>
    <pre><code>node tools/generate-manifest.js</code></pre>
    <p>
      이 페이지는 GitHub Pages에 함께 올라가도 앱 실행에는 영향을 주지 않는 개발용 안내 페이지입니다.
    </p>
  </main>
</body>
</html>
